name: Weekly Summary Digest Email

on:
  schedule:
    # Sunday 12:00 Beijing time (04:00 UTC)
    - cron: "0 4 * * 0"
  workflow_dispatch:
    inputs:
      trial:
        description: Send as trial preview ([Trial] subject, max 10 items)
        type: boolean
        default: true
      max_items:
        description: Max summaries in email (0 = no limit)
        required: false
        default: "10"

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Send weekly digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          WEEKLY_DIGEST_TO: mapledong1996@hotmail.com
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          ARGS="--days 7"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.trial }}" = "true" ]; then
              ARGS="$ARGS --trial"
            fi
            MAX="${{ github.event.inputs.max_items }}"
            if [ -n "$MAX" ] && [ "$MAX" != "0" ]; then
              ARGS="$ARGS --max-items $MAX"
            fi
          fi
          python scripts/send_weekly_digest.py $ARGS
