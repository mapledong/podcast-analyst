name: Weekly Summary Digest Email

on:
  schedule:
    # Friday 12:00 Beijing time (04:00 UTC) — production template v1
    - cron: "0 4 * * 5"
  workflow_dispatch:
    inputs:
      trial:
        description: Preview mode only ([Trial] subject banner)
        type: boolean
        default: false
      max_items:
        description: Max episodes (0 = no limit)
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install pyyaml
      - name: Verify SMTP secrets
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: bash scripts/verify_smtp_secrets.sh
      - name: Send weekly digest (template v1)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          WEEKLY_DIGEST_TO: ${{ secrets.WEEKLY_DIGEST_TO || 'mapledong1996@hotmail.com' }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          set -euo pipefail
          ARGS="--days 7"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.trial }}" = "true" ]; then
              ARGS="$ARGS --trial"
            fi
            MAX="${{ github.event.inputs.max_items }}"
            if [ -n "$MAX" ] && [ "$MAX" != "0" ]; then
              ARGS="$ARGS --max-items $MAX"
            fi
          fi
          python scripts/send_weekly_digest.py $ARGS
