name: Nightly Content Update

on:
  schedule:
    # Daily 01:00 Beijing (17:00 UTC)
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: Max summaries per run
        required: false
        default: "8"

permissions:
  contents: write

concurrency:
  group: nightly-content-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install cursor-sdk
          cd web && npm ci
      - name: Discover new episodes (all series)
        run: |
          set -euo pipefail
          python scripts/discover_iltb.py
          python scripts/discover_acquired.py
          python scripts/discover_colossus_podcasts.py --founders-youtube
        env:
          PYTHONPATH: ${{ github.workspace }}
      # YouTube captions are fetched by youtube-captions.yml (4× daily, slow batch).
      - name: Report pending new episodes
        run: |
          python scripts/report_new_episodes.py --stats
          python scripts/report_new_episodes.py --ready --recent --limit 10 || true
          python scripts/resolve_curated_bb_founders.py --stats || true
      - name: Run nightly summary agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          CURSOR_AGENT_MODEL: ${{ vars.CURSOR_AGENT_MODEL || 'auto' }}
          NIGHTLY_BATCH_SIZE: ${{ vars.NIGHTLY_BATCH_SIZE || github.event.inputs.batch_size || '8' }}
          CURSOR_SDK_TIMEOUT: "3600"
        run: python scripts/nightly_content_update.py
      - name: Post-process and sync web
        run: |
          python scripts/normalize_summary_tickers.py --publish || true
          python scripts/fix_meta_prose_batch.py || true
          node web/scripts/sync-content.mjs
      - name: Block mp3 from commit
        run: chmod +x scripts/verify_no_mp3_in_commit.sh && ./scripts/verify_no_mp3_in_commit.sh
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Nightly content update"
          file_pattern: "data/approved/** outputs/** web/src/data/** config/episodes.yaml data/discovered/** data/transcripts/**"
          push: true
