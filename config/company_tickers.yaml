# Canonical US ticker symbols for publicly traded companies.
# Used by web discovery filters, validation, and batch normalization.
#
# aliases: company names / alternate spellings (lowercase keys) → canonical ticker
# ticker_aliases: alternate tickers (foreign listings, share classes) → canonical ticker
#
# Display preference: primary US ticker (e.g. LVMH/MC.PA → LVMUY ADR, not Paris listing).
# ADR rule: if a company has a liquid US ADR, always use the ADR ticker (BABA, BIDU, XPEV)
# in keywords and investment_implications — not HK codes (9988.HK) and not china_listings name pills.
# china_listings is only for HK/A-share names without a US ADR (e.g. 9992.HK, 2171.HK).

aliases:
  # Mega-cap US
  amazon: AMZN
  "amazon.com": AMZN
  "amazon web services": AMZN
  alphabet: GOOGL
  apple: AAPL
  meta: META
  facebook: META
  google: GOOGL
  microsoft: MSFT
  nvidia: NVDA
  tesla: TSLA
  netflix: NFLX
  costco: COST
  uber: UBER
  disney: DIS
  "walt disney": DIS
  salesforce: CRM
  oracle: ORCL
  "berkshire hathaway": BRK.B
  berkshire: BRK.B

  # Large-cap US
  adobe: ADBE
  airbnb: ABNB
  alibaba: BABA
  baidu: BIDU
  broadcom: AVGO
  coinbase: COIN
  doordash: DASH
  intel: INTC
  jpmorgan: JPM
  "jp morgan": JPM
  "jpmorgan chase": JPM
  mercado libre: MELI
  nike: NKE
  palantir: PLTR
  paypal: PYPL
  qualcomm: QCOM
  roblox: RBLX
  shopify: SHOP
  spotify: SPOT
  square: SQ
  block: SQ
  sony: SONY
  "sony corporation": SONY
  tsmc: TSM
  "taiwan semiconductor": TSM
  walmart: WMT
  zoom: ZM
  cloudflare: NET
  datadog: DDOG
  doximity: DOCS
  instagram: META
  mongodb: MDB
  peloton: PTON
  pinterest: PINS
  robinhood: HOOD
  slack: CRM
  snowflake: SNOW
  toast: TOST
  visa: V
  "warner bros": WBD
  "warner bros discovery": WBD

  # ADRs / foreign listings → US display ticker
  ferrari: RACE
  lvmh: LVMUY
  "louis vuitton": LVMUY
  carsgen: 2171.HK
  科济药业: 2171.HK

ticker_aliases:
  GOOG: GOOGL
  "BRK.A": BRK.B
  "BRK-A": BRK.B
  "MC.PA": LVMUY
  MC: LVMUY
  LVMH: LVMUY
  # HK listings → US ADR (canonical for JSON keywords and investment tickers)
  "9988.HK": BABA
  "9888.HK": BIDU
  "9868.HK": XPEV
  "9618.HK": JD
  "1024.HK": NTES
  "0700.HK": TCEHY

# China/HK/A-share listings without a US ADR: display as 公司名（TICKER） in zh prose;
# card pills show English company name by default (CARsgen, Pop Mart). US ADRs (BABA, XPEV)
# stay as ticker symbols everywhere — see ticker_aliases, not this section.
china_listings:
  9992.HK:
    zh: 泡泡玛特
    en: Pop Mart
  0981.HK:
    zh: 中芯国际
    en: SMIC
  300866.SZ:
    zh: 安克创新
    en: Anker Innovations
  2171.HK:
    zh: 科济药业
    en: CARsgen
