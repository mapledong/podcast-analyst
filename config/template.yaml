# Podcast summary template v4.10 (standard)
# Applies to: Invest Like the Best, Founders, Business Breakdowns
# Acquired uses config/template-acquired.yaml (long-form profile — see that file).
#
# Site-wide read targets @ 200 wpm:
#   <60 min episode  → ~3–5 min read
#   <90 min episode  → ~5 min read (≤5 min)
#   90–179 min      → 5–8 min read
#   180+ min        → 8–10 min read

reading_speed_wpm: 200
template_version: "4.10"

# Standard profile — interview / guest-driven podcasts (ILTB, Founders, BB).
# Acquired uses config/template-acquired.yaml (see template_profile there).
template_profile:
  depth: standard
  important_facts: 3
  key_insights: 3
  chronology_events_min: 5
  chronology_events_max: 10
  exclusive_sections: []

target_read_minutes:
  under_60_min: 4
  under_90_min: 5
  90_to_180_min: 6
  over_180_min: 9

sections:
  - id: episode_rating
    title: "Episode Rating"
    required: true
    fields:
      - overall

  - id: header_meta
    title: "Header Metadata"
    required: true

  - id: keywords
    title: "Topics / Keywords"
    required: true
    item_count_min: 3
    item_count_max: 4
    exclude_from_word_count: true
    guidance: >
      Use standard US ticker symbols (e.g. NVDA, GOOGL, LVMUY) for publicly traded
      companies. Reserve company names for private entities (Private:Name), people,
      themes, or industries (e.g. Semiconductors, Capital Allocation). Do not mix a
      company name and its ticker as separate keywords.

  - id: conclusion
    title: "Conclusion"
    min_words: 40
    max_words: 100
    required: true

  - id: background
    title: "Background"
    max_words: 220
    required: true

  - id: important_facts
    title: "Key Facts"
    min_words: 200
    max_words: 500
    item_count: 3
    require_quantitative: true
    required: true

  - id: mental_model
    title: "Mental Model"
    min_words: 150
    max_words: 420
    required: true

  - id: key_insights
    title: "Key Insights (Views & Q&A)"
    item_count: 3
    required: true
    max_words_per_view: 50
    max_words_per_answer: 130

  - id: top_investment_implications
    title: "Investment Implications"
    item_count_min: 1
    item_count_max: 3
    required: true

  - id: golden_quotes
    title: "Golden Quotes"
    max_words: 160
    item_count: 3
    required: true

  - id: chronology
    title: "Chronology"
    required: true
    exclude_from_word_count: true
    item_count_min: 5
    item_count_max: 10
    fields:
      - date
      - event

  - id: disclaimer
    title: "Disclaimer"
    required: true
    exclude_from_word_count: true

total_word_limits:
  under_60_min: 1000
  under_90_min: 1100
  90_to_180_min: 1600
  over_180_min: 2000

minimum_word_limits:
  under_60_min: 600
  under_90_min: 700
  90_to_180_min: 1000
  over_180_min: 1600

content_policy:
  require_transcript_for_generation: true
  facts_must_be_verifiable: true
  prose_style:
    voice: human_analyst
    summary: >
      Write like a sharp human analyst briefing a PM — a proper summary or research
      note, not generated filler. Prefer concrete facts and plain sentences over
      polished-but-empty AI phrasing.
    avoid:
      - AI boilerplate ("it's worth noting", "delve", "underscores", "at its core", "serves as a testament", "in [Name]'s framing")
      - buzzword stacking (playbook, leverage, unlock, ecosystem, holistic, landscape, robust, paradigm, synergy)
      - transcript meta-junk ("Transcript line:", "This maps to", duplicated facts pasted across sections to pad word count)
      - stiff essay transitions (Moreover, Furthermore, In conclusion mid-section)
      - repetitive parallel triplets and copy-paste padding
    prefer:
      - named people, companies, and numbers in every Key Fact
      - short and medium sentences with varied rhythm
      - active voice; one clear idea per sentence in Key Facts
      - prose that could appear in a buy-side note or well-edited business summary

investment_directions:
  - Long
  - Short
  - Watch

investment_confidence:
  - High
  - Medium
  - Low

investment_policy:
  prefer_directions:
    - Long
    - Short
  watch_max_count: 1
  require_directional_when_tradable: true

rating_distribution:
  scope: per_podcast
  cap_method: floor
  min_episodes_to_enforce: 5
  five_star_max_pct: 0.20
  four_star_max_pct: 0.30
  default_rating: 3
  guidance: >
    Most episodes earn 3★. Reserve 4★ for unusually strong insight; 5★ for landmark
    reference episodes only. Caps are enforced per podcast (~20% at 5★, ~30% at 4★).
